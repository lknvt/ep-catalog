<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EP Optom — Каталоги</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #c0392b;
    --red-dark: #a93226;
    --red-soft: rgba(192, 57, 43, 0.08);
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dbd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* ===== ГЛАВНЫЙ ЭКРАН ===== */
  #main-screen {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  .header {
    background: var(--white);
    padding: 18px 20px 16px;
    border-bottom: 3px solid var(--red);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .header img.logo {
    height: 52px;
    width: auto;
    object-fit: contain;
  }

  .tagline {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }

  .banner {
    background: var(--white);
    margin: 12px 12px 0;
    border-radius: 6px;
    padding: 20px 20px;
    border-left: 4px solid var(--red);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .banner-title {
    font-family: 'PT Serif', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
  }

  .banner-title span { color: var(--red); }

  .banner-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .section-header {
    padding: 18px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header .line {
    height: 2px; width: 20px;
    background: var(--red);
    border-radius: 2px;
  }

  .section-header span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .catalogs {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .catalog-card {
    background: var(--white);
    border-radius: 6px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.35s ease forwards;
  }

  .catalog-card:nth-child(1) { animation-delay: 0.05s; }
  .catalog-card:nth-child(2) { animation-delay: 0.10s; }
  .catalog-card:nth-child(3) { animation-delay: 0.15s; }
  .catalog-card:nth-child(4) { animation-delay: 0.20s; }
  .catalog-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .catalog-card:active {
    background: var(--red-soft);
    border-color: rgba(192,57,43,0.2);
    transform: scale(0.99);
  }

  .cat-icon {
    width: 46px; height: 46px;
    background: var(--red-soft);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(192,57,43,0.15);
  }

  .cat-icon svg {
    width: 22px; height: 22px;
    stroke: var(--red);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card-info { flex: 1; }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-meta .dot {
    width: 3px; height: 3px;
    background: var(--red);
    border-radius: 50%;
    opacity: 0.5;
  }

  .card-arrow {
    width: 28px; height: 28px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-arrow svg {
    width: 13px; height: 13px;
    stroke: white; fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ===== PDF ПРОСМОТРЩИК ===== */
  #pdf-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: #1a1a1a;
  }

  .pdf-header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .back-btn {
    width: 36px; height: 36px;
    background: var(--red-soft);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .back-btn svg {
    width: 16px; height: 16px;
    stroke: var(--red); fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .pdf-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .pdf-pages {
    font-size: 11px;
    color: var(--text-muted);
  }

  #pdf-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #pdf-container canvas {
    max-width: 100%;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .pdf-loading {
    color: #ccc;
    font-size: 14px;
    padding: 40px;
    text-align: center;
  }

  .pdf-loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(192,57,43,0.3);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .footer {
    text-align: center;
    padding: 24px 20px 0;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="main-screen">
  <div class="header">
    <img class="logo" src="logo.png" alt="EP Optom">
    <div class="tagline">Напольные покрытия оптом</div>
  </div>

  <div class="banner">
    <div class="banner-title">Профессиональные<br><span>напольные покрытия</span></div>
    <div class="banner-sub">Выберите каталог для просмотра</div>
  </div>

  <div class="section-header">
    <div class="line"></div>
    <span>Каталоги продукции</span>
  </div>

  <div class="catalogs">
    <div class="catalog-card" onclick="openPDF('gomogen.pdf', 'Гомогенные покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg></div>
      <div class="card-info">
        <div class="card-name">Гомогенные покрытия</div>
        <div class="card-meta">Каталог <div class="dot"></div> PDF</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('getero.pdf', 'Гетерогенные покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3 C8 7 8 17 12 21"/><path d="M12 3 C16 7 16 17 12 21"/></svg></div>
      <div class="card-info">
        <div class="card-name">Гетерогенные покрытия</div>
        <div class="card-meta">Каталог <div class="dot"></div> PDF</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('lvt.pdf', 'LVT покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
      <div class="card-info">
        <div class="card-name">LVT покрытия</div>
        <div class="card-meta">Каталог <div class="dot"></div> PDF</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('kovrol.pdf', 'Ковролин')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M3 6 Q12 3 21 6 L21 18 Q12 21 3 18 Z"/><line x1="3" y1="12" x2="21" y2="12"/></svg></div>
      <div class="card-info">
        <div class="card-name">Ковролин</div>
        <div class="card-meta">Каталог <div class="dot"></div> PDF</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('sport.pdf', 'Спортивные полы')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20 C6 16 18 16 18 20"/><line x1="12" y1="11" x2="12" y2="15"/></svg></div>
      <div class="card-info">
        <div class="card-name">Спортивные полы</div>
        <div class="card-meta">Каталог <div class="dot"></div> PDF</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>
  </div>

  <div class="footer">EP Optom © 2026</div>
</div>

<!-- PDF ПРОСМОТРЩИК -->
<div id="pdf-screen">
  <div class="pdf-header">
    <div class="back-btn" onclick="closePDF()">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="pdf-title" id="pdf-title">Каталог</div>
    <div class="pdf-pages" id="pdf-pages"></div>
  </div>
  <div id="pdf-container">
    <div class="pdf-loading">
      <div class="spinner"></div>
      Загрузка каталога...
    </div>
  </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  const BASE_URL = 'https://lknvt.github.io/ep-catalog/';

  async function openPDF(filename, title) {
    const mainScreen = document.getElementById('main-screen');
    const pdfScreen = document.getElementById('pdf-screen');
    const container = document.getElementById('pdf-container');
    const titleEl = document.getElementById('pdf-title');
    const pagesEl = document.getElementById('pdf-pages');

    mainScreen.style.display = 'none';
    pdfScreen.style.display = 'flex';
    titleEl.textContent = title;
    pagesEl.textContent = '';
    container.innerHTML = '<div class="pdf-loading"><div class="spinner"></div>Загрузка каталога...</div>';

    try {
      const pdf = await pdfjsLib.getDocument(BASE_URL + filename).promise;
      const totalPages = pdf.numPages;
      pagesEl.textContent = totalPages + ' стр.';
      container.innerHTML = '';

      for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: window.devicePixelRatio || 1.5 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = '100%';
        await page.render({ canvasContext: ctx, viewport }).promise;
        container.appendChild(canvas);
      }
    } catch (e) {
      container.innerHTML = '<div class="pdf-loading">Ошибка загрузки. Попробуйте ещё раз.</div>';
    }
  }

  function closePDF() {
    document.getElementById('pdf-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('pdf-container').innerHTML = '';
  }
</script>
</body>
</html>
