<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP Optom — Каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #c0392b;
    --red-soft: rgba(192, 57, 43, 0.08);
    --red-dark: #a93226;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dbd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
  }

  /* ===== ЭКРАНЫ ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    background: var(--bg);
    z-index: 10;
  }
  .screen.active { display: flex; }

  .screen-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }

  /* ===== ШАПКА ===== */
  .app-header {
    background: var(--white);
    border-bottom: 3px solid var(--red);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .app-header .logo-sm { height: 32px; width: auto; }
  .app-header .header-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .back-btn {
    width: 36px; height: 36px;
    background: var(--red-soft);
    border: 1px solid rgba(192,57,43,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.15s;
  }
  .back-btn:active { background: rgba(192,57,43,0.18); }
  .back-btn svg { width: 18px; height: 18px; stroke: var(--red); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  /* ===== ГЛАВНЫЙ ЭКРАН ===== */
  #main-screen { display: flex; }
  .main-inner { max-width: 480px; margin: 0 auto; padding-bottom: 32px; width: 100%; }

  .main-header {
    background: var(--white);
    padding: 18px 20px 16px;
    border-bottom: 3px solid var(--red);
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .main-header img { height: 52px; width: auto; object-fit: contain; }
  .tagline { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }

  .banner {
    background: var(--white); margin: 12px 12px 0;
    border-radius: 8px; padding: 20px;
    border-left: 4px solid var(--red);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .banner-title { font-family: 'PT Serif', serif; font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
  .banner-title span { color: var(--red); }
  .banner-sub { font-size: 12px; color: var(--text-muted); }

  .section-header { padding: 18px 20px 10px; display: flex; align-items: center; gap: 10px; }
  .section-header .line { height: 2px; width: 20px; background: var(--red); border-radius: 2px; }
  .section-header span { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }

  .catalogs { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }

  .catalog-card {
    background: var(--white); border-radius: 8px; padding: 16px 18px;
    display: flex; align-items: center; gap: 16px; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid var(--border);
    transition: all 0.2s; opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.35s ease forwards;
  }
  .catalog-card:active { background: var(--red-soft); border-color: rgba(192,57,43,0.2); transform: scale(0.99); }

  .cat-icon {
    width: 46px; height: 46px; background: var(--red-soft);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: 1px solid rgba(192,57,43,0.15);
  }
  .cat-icon svg { width: 22px; height: 22px; stroke: var(--red); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .card-info { flex: 1; }
  .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .card-meta .dot { width: 3px; height: 3px; background: var(--red); border-radius: 50%; opacity: 0.5; }
  .card-arrow { width: 28px; height: 28px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-arrow svg { width: 13px; height: 13px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .footer { text-align: center; padding: 24px 20px 0; font-size: 11px; color: var(--text-muted); }

  /* ===== СПИСОК ТОВАРОВ ===== */
  #category-screen .screen-body { padding-bottom: 24px; }

  .products-list {
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px; max-width: 480px; margin: 0 auto; width: 100%;
  }

  .product-card {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    overflow: hidden; display: flex; cursor: pointer;
    transition: all 0.2s;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp 0.3s ease forwards;
  }
  .product-card:active { transform: scale(0.98); box-shadow: none; }

  .product-thumb {
    width: 110px; min-height: 110px;
    background: var(--red-soft);
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product-thumb .no-img {
    width: 100%; min-height: 110px;
    display: flex; align-items: center; justify-content: center;
  }
  .product-thumb .no-img svg { width: 34px; height: 34px; stroke: var(--red); fill: none; stroke-width: 1.3; stroke-linecap: round; stroke-linejoin: round; opacity: 0.4; }

  .stock-badge {
    position: absolute; top: 6px; left: 6px;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 10px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .stock-badge.in  { background: rgba(39,174,96,0.15); color: #27ae60; }
  .stock-badge.out { background: rgba(150,150,150,0.15); color: #999; }

  .product-info { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; gap: 3px; }
  .product-brand { font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: 0.08em; text-transform: uppercase; }
  .product-name  { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .product-article { font-size: 10px; color: var(--text-muted); }
  .product-price { font-size: 15px; font-weight: 700; color: var(--red); margin-top: 4px; }
  .product-spec-preview { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* ===== ДЕТАЛЬНАЯ СТРАНИЦА ===== */
  #product-screen .screen-body { padding-bottom: 32px; }
  .product-detail { max-width: 480px; margin: 0 auto; }

  .product-image-wrap {
    width: 100%; background: #f0ede9;
    position: relative; aspect-ratio: 4/3; overflow: hidden;
  }
  .product-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product-image-wrap .no-img-lg {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    background: var(--red-soft); color: var(--text-muted); font-size: 12px;
  }
  .product-image-wrap .no-img-lg svg { width: 52px; height: 52px; stroke: var(--red); fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.35; }

  .brand-badge {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(255,255,255,0.92);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11px; font-weight: 700;
    color: var(--red); letter-spacing: 0.1em; text-transform: uppercase;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .product-body { padding: 16px 16px 0; }

  .product-header-row {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px; margin-bottom: 6px;
  }
  .product-full-name {
    font-family: 'PT Serif', serif;
    font-size: 20px; font-weight: 700;
    color: var(--text); line-height: 1.2; flex: 1;
  }
  .product-full-price {
    font-size: 16px; font-weight: 700;
    color: var(--red); white-space: nowrap; flex-shrink: 0;
    padding-top: 4px;
  }

  .product-art-row { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }

  .product-desc { font-size: 13px; line-height: 1.65; color: #444; margin-bottom: 16px; }

  /* таблица характеристик */
  .specs-block {
    background: var(--white); border-radius: 10px;
    border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px;
  }
  .specs-block-title {
    padding: 9px 14px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .spec-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .spec-row:last-child { border-bottom: none; }
  .spec-label { color: var(--text-muted); }
  .spec-value { font-weight: 600; color: var(--text); text-align: right; max-width: 55%; }

  /* цвета */
  .colors-block { margin-bottom: 16px; }
  .colors-title { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .color-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .color-chip { font-size: 11px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; color: var(--text); }

  /* наличие */
  .stock-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 13px; }
  .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stock-dot.in  { background: #27ae60; }
  .stock-dot.out { background: #bbb; }

  /* загрузка / ошибка */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 14px; color: var(--text-muted); font-size: 13px; }
  .spinner { width: 34px; height: 34px; border: 3px solid rgba(192,57,43,0.2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .error-wrap { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; line-height: 1.6; }
  .error-wrap strong { color: var(--red); font-size: 15px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- ===== ГЛАВНЫЙ ЭКРАН ===== -->
<div id="main-screen" class="screen active">
  <div class="screen-body">
    <div class="main-inner">
      <div class="main-header">
        <img src="logo.png" alt="EP Optom">
        <div class="tagline">Напольные покрытия оптом</div>
      </div>
      <div class="banner">
        <div class="banner-title">Профессиональные<br><span>напольные покрытия</span></div>
        <div class="banner-sub">Выберите категорию для просмотра</div>
      </div>
      <div class="section-header"><div class="line"></div><span>Каталог продукции</span></div>
      <div class="catalogs" id="categories-list">
        <div class="loading-wrap"><div class="spinner"></div>Загрузка...</div>
      </div>
      <div class="footer">EP Optom © 2026</div>
    </div>
  </div>
</div>

<!-- ===== ЭКРАН КАТЕГОРИИ ===== -->
<div id="category-screen" class="screen">
  <div class="app-header">
    <div class="back-btn" id="back-to-main">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="header-title" id="category-title">Категория</div>
    <img src="logo.png" alt="" class="logo-sm">
  </div>
  <div class="screen-body">
    <div class="products-list" id="products-list"></div>
  </div>
</div>

<!-- ===== ЭКРАН ТОВАРА ===== -->
<div id="product-screen" class="screen">
  <div class="app-header">
    <div class="back-btn" id="back-to-category">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="header-title" id="product-screen-title">Товар</div>
    <img src="logo.png" alt="" class="logo-sm">
  </div>
  <div class="screen-body">
    <div id="product-detail-wrap"></div>
  </div>
</div>

<script>
if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

const ICONS = {
  homogen: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,
  hetero:  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3 C8 7 8 17 12 21"/><path d="M12 3 C16 7 16 17 12 21"/></svg>`,
  lvt:     `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
  carpet:  `<svg viewBox="0 0 24 24"><path d="M3 6 Q12 3 21 6 L21 18 Q12 21 3 18 Z"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`,
  sport:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20 C6 16 18 16 18 20"/><line x1="12" y1="11" x2="12" y2="15"/></svg>`,
  default: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`
};

const NO_IMG_SVG = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>`;

let catalog = null;
let currentCategoryId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).querySelector('.screen-body')?.scrollTo(0, 0);
}

// ===== ЗАГРУЗКА =====
async function loadCatalog() {
  try {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error();
    catalog = await res.json();
    renderCategories();
  } catch {
    document.getElementById('categories-list').innerHTML =
      `<div class="error-wrap"><strong>Не удалось загрузить каталог</strong>Убедитесь, что файл catalog.json находится рядом с index.html</div>`;
  }
}

// ===== КАТЕГОРИИ =====
function renderCategories() {
  const list = document.getElementById('categories-list');
  list.innerHTML = '';
  catalog.categories.forEach((cat, i) => {
    const count = cat.products?.length || 0;
    const card = document.createElement('div');
    card.className = 'catalog-card';
    card.style.animationDelay = (i * 0.05 + 0.05) + 's';
    card.innerHTML = `
      <div class="cat-icon">${ICONS[cat.icon] || ICONS.default}</div>
      <div class="card-info">
        <div class="card-name">${cat.name}</div>
        <div class="card-meta">${cat.description}<div class="dot"></div>${count} позиций</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    `;
    card.addEventListener('click', () => openCategory(cat.id));
    list.appendChild(card);
  });
}

// ===== СПИСОК ТОВАРОВ =====
function openCategory(id) {
  const cat = catalog.categories.find(c => c.id === id);
  if (!cat) return;
  currentCategoryId = id;
  document.getElementById('category-title').textContent = cat.name;

  const list = document.getElementById('products-list');
  list.innerHTML = '';

  if (!cat.products?.length) {
    list.innerHTML = '<div class="error-wrap"><strong>Пусто</strong>В этой категории пока нет товаров</div>';
  } else {
    cat.products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.animationDelay = (i * 0.05 + 0.05) + 's';

      // превью первых двух характеристик
      const specPreview = (p.specs || []).slice(0, 2).map(s => s.value).join(' · ');

      const imgHtml = p.image
        ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'no-img\\'>${NO_IMG_SVG.replace(/'/g, "&#39;")}</div>'">`
        : `<div class="no-img">${NO_IMG_SVG}</div>`;

      card.innerHTML = `
        <div class="product-thumb">
          ${imgHtml}
          <div class="stock-badge ${p.in_stock ? 'in' : 'out'}">${p.in_stock ? 'В наличии' : 'Под заказ'}</div>
        </div>
        <div class="product-info">
          ${p.brand ? `<div class="product-brand">${p.brand}</div>` : ''}
          <div class="product-name">${p.name}</div>
          <div class="product-article">${p.article || ''}</div>
          <div class="product-price">${p.price || '—'}</div>
          ${specPreview ? `<div class="product-spec-preview">${specPreview}</div>` : ''}
        </div>
      `;
      card.addEventListener('click', () => openProduct(p.id));
      list.appendChild(card);
    });
  }

  showScreen('category-screen');
}

// ===== ДЕТАЛЬНАЯ СТРАНИЦА =====
function openProduct(productId) {
  const cat = catalog.categories.find(c => c.id === currentCategoryId);
  const p = cat?.products.find(pr => pr.id === productId);
  if (!p) return;

  document.getElementById('product-screen-title').textContent = p.name;

  const imgHtml = p.image
    ? `<img src="${p.image}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'no-img-lg\\'>${NO_IMG_SVG.replace(/'/g,"&#39;")}<span>Фото скоро появится</span></div>'">`
    : `<div class="no-img-lg">${NO_IMG_SVG}<span>Фото скоро появится</span></div>`;

  const specsHtml = (p.specs || []).length
    ? `<div class="specs-block">
        <div class="specs-block-title">Характеристики</div>
        ${p.specs.map(s => `
          <div class="spec-row">
            <span class="spec-label">${s.label}</span>
            <span class="spec-value">${s.value}</span>
          </div>`).join('')}
      </div>` : '';

  const colorsHtml = p.colors?.length
    ? `<div class="colors-block">
        <div class="colors-title">Доступные цвета / декоры</div>
        <div class="color-chips">${p.colors.map(c => `<span class="color-chip">${c}</span>`).join('')}</div>
      </div>` : '';

  document.getElementById('product-detail-wrap').innerHTML = `
    <div class="product-detail">
      <div class="product-image-wrap">
        ${imgHtml}
        ${p.brand ? `<div class="brand-badge">${p.brand}</div>` : ''}
      </div>
      <div class="product-body">
        <div class="product-header-row">
          <div class="product-full-name">${p.name}</div>
          ${p.price ? `<div class="product-full-price">${p.price}</div>` : ''}
        </div>
        <div class="product-art-row">Артикул: ${p.article || '—'}</div>
        ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
        ${specsHtml}
        ${colorsHtml}
        <div class="stock-row">
          <div class="stock-dot ${p.in_stock ? 'in' : 'out'}"></div>
          <span>${p.in_stock ? 'Есть в наличии' : 'Под заказ'}</span>
        </div>
      </div>
    </div>`;

  showScreen('product-screen');
}

document.getElementById('back-to-main').addEventListener('click', () => showScreen('main-screen'));
document.getElementById('back-to-category').addEventListener('click', () => showScreen('category-screen'));

loadCatalog();
</script>
</body>
</html>
