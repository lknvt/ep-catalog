<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP Optom — Каталоги</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #c0392b;
    --red-soft: rgba(192, 57, 43, 0.08);
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dbd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  #main-screen {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .header {
    background: var(--white);
    padding: 18px 20px 16px;
    border-bottom: 3px solid var(--red);
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .header img.logo { height: 52px; width: auto; object-fit: contain; }
  .tagline { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; }

  .banner {
    background: var(--white); margin: 12px 12px 0;
    border-radius: 6px; padding: 20px;
    border-left: 4px solid var(--red);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .banner-title { font-family: 'PT Serif', serif; font-size: 20px; font-weight: 700; line-height: 1.2; color: var(--text); margin-bottom: 4px; }
  .banner-title span { color: var(--red); }
  .banner-sub { font-size: 12px; color: var(--text-muted); }

  .section-header { padding: 18px 20px 10px; display: flex; align-items: center; gap: 10px; }
  .section-header .line { height: 2px; width: 20px; background: var(--red); border-radius: 2px; }
  .section-header span { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }

  .catalogs { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }

  .catalog-card {
    background: var(--white); border-radius: 6px; padding: 16px 18px;
    display: flex; align-items: center; gap: 16px; cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid var(--border);
    transition: all 0.2s ease; opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.35s ease forwards;
  }
  .catalog-card:nth-child(1){animation-delay:.05s}
  .catalog-card:nth-child(2){animation-delay:.10s}
  .catalog-card:nth-child(3){animation-delay:.15s}
  .catalog-card:nth-child(4){animation-delay:.20s}
  .catalog-card:nth-child(5){animation-delay:.25s}
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .catalog-card:active { background: var(--red-soft); border-color: rgba(192,57,43,0.2); transform: scale(0.99); }

  .cat-icon { width: 46px; height: 46px; background: var(--red-soft); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid rgba(192,57,43,0.15); }
  .cat-icon svg { width: 22px; height: 22px; stroke: var(--red); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .card-info { flex: 1; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .card-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .card-meta .dot { width: 3px; height: 3px; background: var(--red); border-radius: 50%; opacity: 0.5; }
  .card-arrow { width: 28px; height: 28px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-arrow svg { width: 13px; height: 13px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .footer { text-align: center; padding: 24px 20px 0; font-size: 11px; color: var(--text-muted); }

  /* ===== PDF SCREEN ===== */
  #pdf-screen {
    display: none; position: fixed; inset: 0;
    flex-direction: column; background: #111;
    z-index: 100;
  }

  .pdf-header {
    background: var(--white); border-bottom: 3px solid var(--red);
    padding: 12px 16px; display: flex; align-items: center;
    gap: 12px; flex-shrink: 0; z-index: 10;
  }
  .back-btn {
    width: 36px; height: 36px; background: var(--red-soft);
    border: 1px solid rgba(192,57,43,0.2); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .back-btn svg { width: 16px; height: 16px; stroke: var(--red); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .pdf-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .pdf-pages { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* Viewport для зума */
  #pdf-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Контент который двигается/масштабируется */
  #pdf-content {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    transform-origin: 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 8px;
  }

  #pdf-content canvas {
    display: block;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .pdf-loading {
    color: #ccc; font-size: 14px;
    padding: 60px 40px; text-align: center;
    min-width: 200px;
  }
  .pdf-loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(192,57,43,0.3);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="main-screen">
  <div class="header">
    <img class="logo" src="logo.png" alt="EP Optom">
    <div class="tagline">Напольные покрытия оптом</div>
  </div>
  <div class="banner">
    <div class="banner-title">Профессиональные<br><span>напольные покрытия</span></div>
    <div class="banner-sub">Выберите каталог для просмотра</div>
  </div>
  <div class="section-header"><div class="line"></div><span>Каталоги продукции</span></div>
  <div class="catalogs">

    <div class="catalog-card" onclick="openPDF('gomogen.pdf','Гомогенные покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg></div>
      <div class="card-info"><div class="card-name">Гомогенные покрытия</div><div class="card-meta">Каталог<div class="dot"></div>PDF</div></div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('getero.pdf','Гетерогенные покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3 C8 7 8 17 12 21"/><path d="M12 3 C16 7 16 17 12 21"/></svg></div>
      <div class="card-info"><div class="card-name">Гетерогенные покрытия</div><div class="card-meta">Каталог<div class="dot"></div>PDF</div></div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('lvt.pdf','LVT покрытия')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
      <div class="card-info"><div class="card-name">LVT покрытия</div><div class="card-meta">Каталог<div class="dot"></div>PDF</div></div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('kovrol.pdf','Ковролин')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><path d="M3 6 Q12 3 21 6 L21 18 Q12 21 3 18 Z"/><line x1="3" y1="12" x2="21" y2="12"/></svg></div>
      <div class="card-info"><div class="card-name">Ковролин</div><div class="card-meta">Каталог<div class="dot"></div>PDF</div></div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

    <div class="catalog-card" onclick="openPDF('sport.pdf','Спортивные полы')">
      <div class="cat-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20 C6 16 18 16 18 20"/><line x1="12" y1="11" x2="12" y2="15"/></svg></div>
      <div class="card-info"><div class="card-name">Спортивные полы</div><div class="card-meta">Каталог<div class="dot"></div>PDF</div></div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
    </div>

  </div>
  <div class="footer">EP Optom © 2026</div>
</div>

<div id="pdf-screen">
  <div class="pdf-header">
    <div class="back-btn" onclick="closePDF()">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="pdf-title" id="pdf-title">Каталог</div>
    <div class="pdf-pages" id="pdf-pages"></div>
  </div>
  <div id="pdf-viewport">
    <div id="pdf-content">
      <div class="pdf-loading"><div class="spinner"></div>Загрузка...</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }

const BASE = 'https://lknvt.github.io/ep-catalog/';

// ============ SMOOTH PAN & ZOOM ============
const viewport = document.getElementById('pdf-viewport');
const content  = document.getElementById('pdf-content');

let tx = 0, ty = 0, scale = 1;
let minScale = 1, maxScale = 5;

// Инерция
let velX = 0, velY = 0;
let rafId = null;

// Состояние касаний
let pointers = new Map();
let lastPinchDist = 0;
let lastMidX = 0, lastMidY = 0;
let isPinching = false;
let isDragging = false;
let lastTap = 0;

function applyTransform(animated) {
  if (animated) {
    content.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
    setTimeout(() => content.style.transition = '', 260);
  } else {
    content.style.transition = '';
  }
  content.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function clampPosition() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const cw = content.scrollWidth * scale;
  const ch = content.scrollHeight * scale;

  const maxX = 0;
  const minX = Math.min(0, vw - cw);
  const maxY = 0;
  const minY = Math.min(0, vh - ch);

  tx = Math.max(minX, Math.min(maxX, tx));
  ty = Math.max(minY, Math.min(maxY, ty));
}

function getDist(p1, p2) {
  const dx = p1.clientX - p2.clientX;
  const dy = p1.clientY - p2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function getMid(p1, p2) {
  return { x: (p1.clientX + p2.clientX) / 2, y: (p1.clientY + p2.clientY) / 2 };
}

viewport.addEventListener('pointerdown', (e) => {
  pointers.set(e.pointerId, e);
  viewport.setPointerCapture(e.pointerId);
  cancelAnimationFrame(rafId);
  velX = 0; velY = 0;

  if (pointers.size === 2) {
    isPinching = true;
    isDragging = false;
    const pts = [...pointers.values()];
    lastPinchDist = getDist(pts[0], pts[1]);
    const mid = getMid(pts[0], pts[1]);
    lastMidX = mid.x;
    lastMidY = mid.y;
  } else if (pointers.size === 1) {
    isDragging = true;
  }
});

viewport.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  pointers.set(e.pointerId, e);

  if (isPinching && pointers.size === 2) {
    const pts = [...pointers.values()];
    const dist = getDist(pts[0], pts[1]);
    const mid = getMid(pts[0], pts[1]);

    // Зум относительно центра щипка
    const ds = dist / lastPinchDist;
    const newScale = Math.min(Math.max(scale * ds, minScale), maxScale);
    const realDs = newScale / scale;

    const rect = viewport.getBoundingClientRect();
    const originX = mid.x - rect.left;
    const originY = mid.y - rect.top;

    tx = originX - realDs * (originX - tx);
    ty = originY - realDs * (originY - ty);
    scale = newScale;

    // Панорамирование при щипке
    tx += mid.x - lastMidX;
    ty += mid.y - lastMidY;

    lastPinchDist = dist;
    lastMidX = mid.x;
    lastMidY = mid.y;

    clampPosition();
    applyTransform(false);

  } else if (isDragging && pointers.size === 1) {
    const dx = e.clientX - prev.clientX;
    const dy = e.clientY - prev.clientY;
    tx += dx;
    ty += dy;
    velX = dx;
    velY = dy;
    clampPosition();
    applyTransform(false);
  }
});

viewport.addEventListener('pointerup', (e) => {
  pointers.delete(e.pointerId);

  if (pointers.size < 2) {
    isPinching = false;

    // Пружина — возврат к minScale если зум меньше 1
    if (scale < minScale) {
      scale = minScale; tx = 0; ty = 0;
      applyTransform(true);
      return;
    }

    // Инерция при свайпе
    if (isDragging && (Math.abs(velX) > 1 || Math.abs(velY) > 1)) {
      function inertia() {
        velX *= 0.92;
        velY *= 0.92;
        tx += velX;
        ty += velY;
        clampPosition();
        applyTransform(false);
        if (Math.abs(velX) > 0.3 || Math.abs(velY) > 0.3) {
          rafId = requestAnimationFrame(inertia);
        }
      }
      rafId = requestAnimationFrame(inertia);
    }
  }

  if (pointers.size === 0) isDragging = false;
});

// Двойной тап — зум x2.5 / сброс
viewport.addEventListener('pointerdown', (e) => {
  if (pointers.size > 1) return;
  const now = Date.now();
  if (now - lastTap < 280) {
    cancelAnimationFrame(rafId);
    if (scale > 1.3) {
      scale = 1; tx = 0; ty = 0;
    } else {
      const rect = viewport.getBoundingClientRect();
      const ox = e.clientX - rect.left;
      const oy = e.clientY - rect.top;
      const ns = 2.5;
      tx = ox - ns * (ox - tx);
      ty = oy - ns * (oy - ty);
      scale = ns;
      clampPosition();
    }
    applyTransform(true);
  }
  lastTap = now;
});

// ============ PDF LOADING ============
function resetZoom() {
  scale = 1; tx = 0; ty = 0;
  content.style.transition = '';
  content.style.transform = 'translate(0,0) scale(1)';
}

async function openPDF(filename, title) {
  resetZoom();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('pdf-screen').style.display = 'flex';
  document.getElementById('pdf-title').textContent = title;
  document.getElementById('pdf-pages').textContent = '';
  content.innerHTML = '<div class="pdf-loading"><div class="spinner"></div>Загрузка каталога...</div>';

  try {
    const pdf = await pdfjsLib.getDocument(BASE + filename).promise;
    const total = pdf.numPages;
    document.getElementById('pdf-pages').textContent = total + ' стр.';
    content.innerHTML = '';

    const vw = viewport.clientWidth - 16;
    const dpr = window.devicePixelRatio || 1;

    for (let i = 1; i <= total; i++) {
      const page = await pdf.getPage(i);
      const vp0 = page.getViewport({ scale: 1 });
      const pageScale = vw / vp0.width;
      const vp = page.getViewport({ scale: pageScale * dpr });

      const canvas = document.createElement('canvas');
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvas.style.width = vw + 'px';
      canvas.style.height = (vp.height / dpr) + 'px';

      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      content.appendChild(canvas);
    }
  } catch(err) {
    content.innerHTML = '<div class="pdf-loading">Ошибка загрузки.<br>Попробуйте ещё раз.</div>';
  }
}

function closePDF() {
  document.getElementById('pdf-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  content.innerHTML = '';
  resetZoom();
  cancelAnimationFrame(rafId);
}
</script>
</body>
</html>
