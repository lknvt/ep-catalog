<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP Optom — Каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #c0392b;
    --red-soft: rgba(192,57,43,0.08);
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dbd4;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; overscroll-behavior:none; background:var(--bg); color:var(--text); font-family:'Montserrat',sans-serif; }

  /* ── ЭКРАНЫ ── */
  .screen { position:fixed; inset:0; display:none; flex-direction:column; background:var(--bg); z-index:10; }
  .screen.active { display:flex; }
  .screen-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain; }

  /* ── ШАПКА ── */
  .app-header { background:var(--white); border-bottom:3px solid var(--red); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .app-header .logo-sm { height:30px; width:auto; }
  .header-title { font-size:13px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .back-btn { width:36px; height:36px; background:var(--red-soft); border:1px solid rgba(192,57,43,.2); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .back-btn:active { background:rgba(192,57,43,.18); }
  .back-btn svg { width:18px; height:18px; stroke:var(--red); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

  /* ── АНИМАЦИИ ── */
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @keyframes spin   { to { transform:rotate(360deg); } }

  /* ══════════════════════════════
     ГЛАВНЫЙ ЭКРАН
  ══════════════════════════════ */
  #main-screen { display:flex; }
  .main-inner { max-width:480px; margin:0 auto; padding-bottom:32px; width:100%; }

  .main-header { background:var(--white); padding:18px 20px 16px; border-bottom:3px solid var(--red); display:flex; flex-direction:column; align-items:center; gap:6px; }
  .main-header img { height:52px; width:auto; object-fit:contain; }
  .tagline { font-size:10px; color:var(--text-muted); letter-spacing:.15em; text-transform:uppercase; }

  .banner { background:var(--white); margin:12px 12px 0; border-radius:8px; padding:20px; border-left:4px solid var(--red); box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .banner-title { font-family:'PT Serif',serif; font-size:20px; font-weight:700; line-height:1.2; margin-bottom:4px; }
  .banner-title span { color:var(--red); }
  .banner-sub { font-size:12px; color:var(--text-muted); }

  .section-header { padding:18px 20px 10px; display:flex; align-items:center; gap:10px; }
  .section-header .line { height:2px; width:20px; background:var(--red); border-radius:2px; }
  .section-header span { font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--text-muted); }

  .catalogs { padding:0 12px; display:flex; flex-direction:column; gap:8px; }

  .catalog-card { background:var(--white); border-radius:8px; padding:16px 18px; display:flex; align-items:center; gap:16px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.06); border:1px solid var(--border); opacity:0; transform:translateY(12px); animation:fadeUp .35s ease forwards; }
  .catalog-card:active { background:var(--red-soft); }
  .cat-icon { width:46px; height:46px; background:var(--red-soft); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border:1px solid rgba(192,57,43,.15); }
  .cat-icon svg { width:22px; height:22px; stroke:var(--red); fill:none; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
  .card-info { flex:1; }
  .card-name { font-size:14px; font-weight:600; line-height:1.3; }
  .card-meta { font-size:11px; color:var(--text-muted); margin-top:3px; display:flex; align-items:center; gap:6px; }
  .card-meta .dot { width:3px; height:3px; background:var(--red); border-radius:50%; opacity:.5; }
  .card-arrow { width:28px; height:28px; background:var(--red); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-arrow svg { width:13px; height:13px; stroke:white; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
  .main-footer { text-align:center; padding:24px 20px 0; font-size:11px; color:var(--text-muted); }

  /* ══════════════════════════════
     ПОИСК
  ══════════════════════════════ */
  .search-wrap { padding:10px 12px 4px; max-width:480px; margin:0 auto; width:100%; }
  .search-box { display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:9px 12px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
  .search-box svg { width:16px; height:16px; stroke:var(--text-muted); fill:none; stroke-width:2; stroke-linecap:round; flex-shrink:0; }
  .search-box input { flex:1; border:none; outline:none; font-family:inherit; font-size:13px; background:transparent; color:var(--text); }
  .search-box input::placeholder { color:var(--text-muted); }
  .search-clear { width:18px; height:18px; background:var(--text-muted); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; opacity:0; transition:opacity .15s; }
  .search-clear.visible { opacity:1; }
  .search-clear svg { width:10px; height:10px; stroke:white; fill:none; stroke-width:2.5; stroke-linecap:round; }

  /* ══════════════════════════════
     СПИСОК ТОВАРОВ (экран категории)
  ══════════════════════════════ */
  #category-screen .screen-body { padding-bottom:24px; }

  .products-wrap { max-width:480px; margin:0 auto; width:100%; padding:8px 12px; }

  /* заголовок коллекции */
  .collection-header {
    display:flex; align-items:center; gap:12px;
    padding:14px 4px 8px;
    margin-top:4px;
  }
  .collection-header:first-child { margin-top:0; }
  .collection-logo-wrap {
    background:var(--white); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px;
    display:flex; align-items:center; justify-content:center;
    min-width:70px; height:36px; flex-shrink:0;
  }
  .collection-logo-wrap img { max-height:22px; max-width:70px; object-fit:contain; display:block; }
  .collection-logo-wrap .brand-text { font-size:12px; font-weight:700; color:var(--red); letter-spacing:.06em; text-transform:uppercase; }
  .collection-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
  .collection-divider { flex:1; height:1px; background:var(--border); }

  /* карточка товара */
  .product-card { background:var(--white); border-radius:10px; border:1px solid var(--border); box-shadow:0 1px 6px rgba(0,0,0,.05); overflow:hidden; display:flex; cursor:pointer; margin-bottom:8px; opacity:0; transform:translateY(10px); animation:fadeUp .3s ease forwards; }
  .product-card:active { transform:scale(.98); box-shadow:none; }

  .product-thumb { width:110px; min-height:110px; background:var(--red-soft); flex-shrink:0; overflow:hidden; }
  .product-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .product-thumb .no-img { width:100%; min-height:110px; display:flex; align-items:center; justify-content:center; }
  .product-thumb .no-img svg { width:34px; height:34px; stroke:var(--red); fill:none; stroke-width:1.3; stroke-linecap:round; stroke-linejoin:round; opacity:.35; }

  .product-info { flex:1; padding:12px 14px; display:flex; flex-direction:column; gap:3px; }
  .product-name  { font-size:14px; font-weight:600; color:var(--text); line-height:1.3; }
  .product-article { font-size:10px; color:var(--text-muted); }
  .product-price { font-size:15px; font-weight:700; color:var(--red); margin-top:4px; }
  .product-spec-preview { font-size:11px; color:var(--text-muted); margin-top:2px; }

  /* пустой поиск */
  .no-results { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px; }
  .no-results strong { display:block; font-size:15px; color:var(--text); margin-bottom:6px; }

  /* ══════════════════════════════
     ДЕТАЛЬНАЯ СТРАНИЦА
  ══════════════════════════════ */
  #product-screen .screen-body { padding-bottom:32px; }
  .product-detail { max-width:480px; margin:0 auto; }

  /* галерея свайп */
  .gallery-wrap { position:relative; width:100%; aspect-ratio:4/3; background:#f0ede9; overflow:hidden; }
  .gallery-track { display:flex; height:100%; transition:transform .3s ease; will-change:transform; }
  .gallery-slide { flex-shrink:0; width:100%; height:100%; }
  .gallery-slide img { width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-slide .no-img-lg { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:var(--red-soft); color:var(--text-muted); font-size:12px; }
  .gallery-slide .no-img-lg svg { width:52px; height:52px; stroke:var(--red); fill:none; stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; opacity:.35; }

  /* лого бренда поверх галереи */
  .gallery-brand {
    position:absolute; bottom:10px; left:10px;
    background:rgba(255,255,255,.92); border-radius:7px; padding:5px 10px;
    display:flex; align-items:center; justify-content:center;
    max-height:34px;
    box-shadow:0 1px 6px rgba(0,0,0,.12);
  }
  .gallery-brand img { max-height:20px; max-width:70px; object-fit:contain; }
  .gallery-brand .brand-text-badge { font-size:11px; font-weight:700; color:var(--red); letter-spacing:.08em; text-transform:uppercase; }

  /* точки галереи */
  .gallery-dots { position:absolute; bottom:10px; right:12px; display:flex; gap:5px; }
  .gallery-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.5); transition:background .2s; }
  .gallery-dot.active { background:#fff; }

  .product-body { padding:16px 16px 0; }
  .product-header-row { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:4px; }
  .product-full-name { font-family:'PT Serif',serif; font-size:20px; font-weight:700; color:var(--text); line-height:1.2; flex:1; }
  .product-full-price { font-size:16px; font-weight:700; color:var(--red); white-space:nowrap; flex-shrink:0; padding-top:4px; }
  .product-art-row { font-size:11px; color:var(--text-muted); margin-bottom:14px; }
  .product-desc { font-size:13px; line-height:1.65; color:#444; margin-bottom:16px; }

  .specs-block { background:var(--white); border-radius:10px; border:1px solid var(--border); overflow:hidden; margin-bottom:16px; }
  .specs-block-title { padding:9px 14px; font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); background:var(--bg); }
  .spec-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; }
  .spec-row:last-child { border-bottom:none; }
  .spec-label { color:var(--text-muted); }
  .spec-value { font-weight:600; color:var(--text); text-align:right; max-width:55%; }

  /* загрузка */
  .loading-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:200px; gap:14px; color:var(--text-muted); font-size:13px; }
  .spinner { width:34px; height:34px; border:3px solid rgba(192,57,43,.2); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }
  .error-wrap { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px; line-height:1.6; }
  .error-wrap strong { color:var(--red); font-size:15px; display:block; margin-bottom:8px; }
</style>
</head>
<body>

<!-- ═══════ ГЛАВНЫЙ ЭКРАН ═══════ -->
<div id="main-screen" class="screen active">
  <div class="screen-body">
    <div class="main-inner">
      <div class="main-header">
        <img src="logo.png" alt="EP Optom">
        <div class="tagline">Напольные покрытия оптом</div>
      </div>
      <div class="banner">
        <div class="banner-title">Профессиональные<br><span>напольные покрытия</span></div>
        <div class="banner-sub">Выберите категорию для просмотра</div>
      </div>
      <div class="section-header"><div class="line"></div><span>Каталог продукции</span></div>
      <div class="catalogs" id="categories-list">
        <div class="loading-wrap"><div class="spinner"></div>Загрузка...</div>
      </div>
      <div class="main-footer">EP Optom © 2026</div>
    </div>
  </div>
</div>

<!-- ═══════ ЭКРАН КАТЕГОРИИ ═══════ -->
<div id="category-screen" class="screen">
  <div class="app-header">
    <div class="back-btn" id="back-to-main">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="header-title" id="category-title">Категория</div>
    <img src="logo.png" alt="" class="logo-sm">
  </div>
  <!-- ПОИСК -->
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input type="search" id="search-input" placeholder="Поиск по названию или артикулу…" autocomplete="off">
      <div class="search-clear" id="search-clear">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
  </div>
  <div class="screen-body">
    <div class="products-wrap" id="products-wrap"></div>
  </div>
</div>

<!-- ═══════ ЭКРАН ТОВАРА ═══════ -->
<div id="product-screen" class="screen">
  <div class="app-header">
    <div class="back-btn" id="back-to-category">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </div>
    <div class="header-title" id="product-screen-title">Товар</div>
    <img src="logo.png" alt="" class="logo-sm">
  </div>
  <div class="screen-body">
    <div id="product-detail-wrap"></div>
  </div>
</div>

<script>
/* ────── Telegram ────── */
if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }

/* ────── Иконки категорий ────── */
const ICONS = {
  homogen: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,
  hetero:  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3 C8 7 8 17 12 21"/><path d="M12 3 C16 7 16 17 12 21"/></svg>`,
  lvt:     `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
  carpet:  `<svg viewBox="0 0 24 24"><path d="M3 6 Q12 3 21 6 L21 18 Q12 21 3 18 Z"/><line x1="3" y1="12" x2="21" y2="12"/></svg>`,
  sport:   `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20 C6 16 18 16 18 20"/><line x1="12" y1="11" x2="12" y2="15"/></svg>`,
  default: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`
};
const NO_IMG = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>`;

/* ────── Состояние ────── */
let catalog = null;
let currentCatId = null;
let currentProductId = null;

/* ────── Навигация ────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).querySelector('.screen-body')?.scrollTo(0, 0);
}

/* ────── Загрузка каталога ────── */
async function loadCatalog() {
  try {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error();
    catalog = await res.json();
    renderCategories();
  } catch {
    document.getElementById('categories-list').innerHTML =
      `<div class="error-wrap"><strong>Не удалось загрузить каталог</strong>Убедитесь, что файл catalog.json находится рядом с index.html</div>`;
  }
}

/* ────── Категории ────── */
function renderCategories() {
  const list = document.getElementById('categories-list');
  list.innerHTML = '';
  catalog.categories.forEach((cat, i) => {
    const total = (cat.collections || []).reduce((s, c) => s + (c.products?.length || 0), 0);
    const card = document.createElement('div');
    card.className = 'catalog-card';
    card.style.animationDelay = (i * .05 + .05) + 's';
    card.innerHTML = `
      <div class="cat-icon">${ICONS[cat.icon] || ICONS.default}</div>
      <div class="card-info">
        <div class="card-name">${cat.name}</div>
        <div class="card-meta">${cat.description}<div class="dot"></div>${total} позиций</div>
      </div>
      <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>`;
    card.addEventListener('click', () => openCategory(cat.id));
    list.appendChild(card);
  });
}

/* ────── Открыть категорию ────── */
function openCategory(id) {
  const cat = catalog.categories.find(c => c.id === id);
  if (!cat) return;
  currentCatId = id;
  document.getElementById('category-title').textContent = cat.name;
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  renderProducts(cat.collections, '');
  showScreen('category-screen');
}

/* ────── Рендер товаров (с фильтром поиска) ────── */
function renderProducts(collections, query) {
  const wrap = document.getElementById('products-wrap');
  wrap.innerHTML = '';
  const q = query.trim().toLowerCase();
  let totalVisible = 0;
  let delay = 0.04;

  collections.forEach(col => {
    const filtered = q
      ? (col.products || []).filter(p =>
          p.name.toLowerCase().includes(q) ||
          (p.article || '').toLowerCase().includes(q))
      : (col.products || []);

    if (!filtered.length) return;
    totalVisible += filtered.length;

    // ── Заголовок коллекции ──
    const header = document.createElement('div');
    header.className = 'collection-header';

    // лого или текст
    const logoWrap = document.createElement('div');
    logoWrap.className = 'collection-logo-wrap';
    if (col.logo) {
      /* ↓↓↓ ПУТЬ К ЛОГОТИПУ БРЕНДА — меняй col.logo в catalog.json ↓↓↓ */
      const img = document.createElement('img');
      img.src = col.logo;
      img.alt = col.brand;
      img.onerror = () => { img.style.display='none'; logoWrap.innerHTML = `<span class="brand-text">${col.brand}</span>`; };
      logoWrap.appendChild(img);
    } else {
      logoWrap.innerHTML = `<span class="brand-text">${col.brand}</span>`;
    }

    const colName = document.createElement('div');
    colName.className = 'collection-name';
    colName.textContent = col.collection;

    const divider = document.createElement('div');
    divider.className = 'collection-divider';

    header.appendChild(logoWrap);
    header.appendChild(colName);
    header.appendChild(divider);
    wrap.appendChild(header);

    // ── Карточки товаров ──
    filtered.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.animationDelay = delay + 's';
      delay = Math.min(delay + 0.04, 0.4);

      /* ↓↓↓ ПЕРВОЕ ФОТО ТОВАРА — меняй p.images[0] в catalog.json ↓↓↓ */
      const thumb = p.images?.[0]
        ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'no-img\\'>${NO_IMG.replace(/'/g,"&#39;")}</div>'">`
        : `<div class="no-img">${NO_IMG}</div>`;

      /* превью первых двух характеристик */
      const specPreview = (p.specs || []).slice(0, 2).map(s => s.value).join(' · ');

      card.innerHTML = `
        <div class="product-thumb">${thumb}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-article">${p.article || ''}</div>
          <!-- ↓↓↓ ЦЕНА — меняй p.price в catalog.json ↓↓↓ -->
          <div class="product-price">${p.price || '—'}</div>
          ${specPreview ? `<div class="product-spec-preview">${specPreview}</div>` : ''}
        </div>`;
      card.addEventListener('click', () => openProduct(col.id, p.id));
      wrap.appendChild(card);
    });
  });

  if (totalVisible === 0) {
    wrap.innerHTML = `<div class="no-results"><strong>Ничего не найдено</strong>Попробуйте другой запрос</div>`;
  }
}

/* ────── Поиск ────── */
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  const q = searchInput.value;
  searchClear.classList.toggle('visible', q.length > 0);
  const cat = catalog.categories.find(c => c.id === currentCatId);
  if (cat) renderProducts(cat.collections, q);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  const cat = catalog.categories.find(c => c.id === currentCatId);
  if (cat) renderProducts(cat.collections, '');
  searchInput.focus();
});

/* ────── Открыть товар ────── */
function openProduct(collectionId, productId) {
  const cat = catalog.categories.find(c => c.id === currentCatId);
  const col = cat?.collections.find(c => c.id === collectionId);
  const p = col?.products.find(pr => pr.id === productId);
  if (!p) return;
  currentProductId = productId;
  document.getElementById('product-screen-title').textContent = p.name;
  renderProductDetail(col, p);
  showScreen('product-screen');
}

/* ────── Детальная страница ────── */
function renderProductDetail(col, p) {
  /* ↓↓↓ МАССИВ ФОТО ТОВАРА — меняй p.images в catalog.json ↓↓↓ */
  const images = p.images && p.images.length ? p.images : [null];

  // галерея
  const slides = images.map(src =>
    src
      ? `<div class="gallery-slide"><img src="${src}" alt="${p.name}" onerror="this.parentNode.innerHTML='<div class=\\'no-img-lg\\'>${NO_IMG.replace(/'/g,"&#39;")}<span>Фото скоро появится</span></div>'"></div>`
      : `<div class="gallery-slide"><div class="no-img-lg">${NO_IMG}<span>Фото скоро появится</span></div></div>`
  ).join('');

  const dots = images.length > 1
    ? `<div class="gallery-dots">${images.map((_,i) => `<div class="gallery-dot${i===0?' active':''}"></div>`).join('')}</div>`
    : '';

  // лого бренда на галерее
  /* ↓↓↓ ЛОГОТИП БРЕНДА — меняй col.logo в catalog.json ↓↓↓ */
  const brandHtml = col.logo
    ? `<div class="gallery-brand"><img src="${col.logo}" alt="${col.brand}" onerror="this.outerHTML='<span class=\\'brand-text-badge\\'>${col.brand}</span>'"></div>`
    : `<div class="gallery-brand"><span class="brand-text-badge">${col.brand}</span></div>`;

  /* ↓↓↓ ХАРАКТЕРИСТИКИ — меняй p.specs в catalog.json ↓↓↓ */
  const specsHtml = (p.specs || []).length
    ? `<div class="specs-block">
        <div class="specs-block-title">Характеристики</div>
        ${p.specs.map(s => `<div class="spec-row"><span class="spec-label">${s.label}</span><span class="spec-value">${s.value}</span></div>`).join('')}
      </div>` : '';

  document.getElementById('product-detail-wrap').innerHTML = `
    <div class="product-detail">
      <div class="gallery-wrap" id="gallery-wrap">
        <div class="gallery-track" id="gallery-track">${slides}</div>
        ${brandHtml}
        ${dots}
      </div>
      <div class="product-body">
        <div class="product-header-row">
          <div class="product-full-name">${p.name}</div>
          <!-- ↓↓↓ ЦЕНА — меняй p.price в catalog.json ↓↓↓ -->
          ${p.price ? `<div class="product-full-price">${p.price}</div>` : ''}
        </div>
        <div class="product-art-row">Артикул: ${p.article || '—'}</div>
        <!-- ↓↓↓ ОПИСАНИЕ — меняй p.description в catalog.json ↓↓↓ -->
        ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
        ${specsHtml}
      </div>
    </div>`;

  // инициализация свайпа галереи
  if (images.length > 1) initGallery(images.length);
}

/* ────── Свайп галереи ────── */
function initGallery(count) {
  const wrap  = document.getElementById('gallery-wrap');
  const track = document.getElementById('gallery-track');
  let cur = 0, startX = 0, dx = 0, dragging = false;

  function goTo(idx) {
    cur = Math.max(0, Math.min(count - 1, idx));
    track.style.transition = 'transform .3s ease';
    track.style.transform = `translateX(-${cur * 100}%)`;
    wrap.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  }

  wrap.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; track.style.transition = 'none'; }, { passive: true });
  wrap.addEventListener('touchmove',  e => { if (!dragging) return; dx = e.touches[0].clientX - startX; track.style.transform = `translateX(calc(-${cur * 100}% + ${dx}px))`; }, { passive: true });
  wrap.addEventListener('touchend',   () => { dragging = false; if (Math.abs(dx) > 40) goTo(dx < 0 ? cur + 1 : cur - 1); else goTo(cur); dx = 0; });
}

/* ────── Кнопки назад ────── */
document.getElementById('back-to-main').addEventListener('click', () => showScreen('main-screen'));
document.getElementById('back-to-category').addEventListener('click', () => showScreen('category-screen'));

/* ────── Старт ────── */
loadCatalog();
</script>
