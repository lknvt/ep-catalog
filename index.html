<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP Optom — Каталоги</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3f0;
    --white: #ffffff;
    --red: #c0392b;
    --red-dark: #a93226;
    --red-soft: rgba(192, 57, 43, 0.08);
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0dbd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* Шапка */
  .header {
    background: var(--white);
    padding: 18px 20px 16px;
    border-bottom: 3px solid var(--red);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .header img.logo {
    height: 52px;
    width: auto;
    object-fit: contain;
  }

  .logo-text .tagline {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Баннер */
  .banner {
    background: var(--white);
    margin: 12px 12px 0;
    border-radius: 6px;
    padding: 24px 20px;
    border-left: 4px solid var(--red);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .banner-title {
    font-family: 'PT Serif', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 6px;
  }

  .banner-title span {
    color: var(--red);
  }

  .banner-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Секция */
  .section-header {
    padding: 20px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header .line {
    height: 2px;
    width: 20px;
    background: var(--red);
    border-radius: 2px;
  }

  .section-header span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Карточки каталогов */
  .catalogs {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .catalog-card {
    background: var(--white);
    border-radius: 6px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.35s ease forwards;
  }

  .catalog-card:nth-child(1) { animation-delay: 0.05s; }
  .catalog-card:nth-child(2) { animation-delay: 0.1s; }
  .catalog-card:nth-child(3) { animation-delay: 0.15s; }
  .catalog-card:nth-child(4) { animation-delay: 0.2s; }
  .catalog-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .catalog-card:active {
    background: var(--red-soft);
    border-color: rgba(192,57,43,0.2);
    transform: scale(0.99);
  }

  /* Иконка категории */
  .cat-icon {
    width: 46px;
    height: 46px;
    background: var(--red-soft);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid rgba(192,57,43,0.15);
  }

  .cat-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--red);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .card-info {
    flex: 1;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-meta .dot {
    width: 3px;
    height: 3px;
    background: var(--red);
    border-radius: 50%;
    opacity: 0.5;
  }

  .card-arrow {
    width: 28px;
    height: 28px;
    background: var(--red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .catalog-card:active .card-arrow {
    transform: translateX(2px);
  }

  .card-arrow svg {
    width: 13px;
    height: 13px;
    stroke: white;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .footer {
    text-align: center;
    padding: 28px 20px 0;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
